    <script>
        /**
         * Lógica para el Slider de Resultados
         */
        async function abrirActaResultado(idActa) {
            if (typeof clienteSupabase === 'undefined') return;
            try {
                const { data: lista, error } = await clienteSupabase.storage.from('actas').list('', { search: idActa });
                const existe = lista && lista.some(f => f.name.toLowerCase() === `${idActa}.xlsx`.toLowerCase());

                if (existe) {
                    window.generarActaDesdeArchivo(idActa);
                } else {
                    alert("⚠️ El acta de este partido todavía no está disponible.");
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión con el servidor de actas.");
            }
        }

        function inicializarSliderResultados() {
            const track = document.getElementById('track-infinito');
            if (!track) return;
            if (typeof jornadas === 'undefined') {
                console.error("❌ Error: No se encuentra la variable 'jornadas'. Asegúrate de que index.js esté cargado antes.");
                return;
            }

            let contenidoHTML = '';
            for (let i = 1; i <= 14; i++) {
                const j = jornadas[i];
                if (!j) continue;

                const partidosDeJornada = obtenerDatosCrudosPartidos(i);
                let filasPartidos = '';
                
                partidosDeJornada.forEach(p => {
                    const aliasL = obtenerAlias(p.l);
                    const aliasV = obtenerAlias(p.v);
                    const idActa = `j${i}_${aliasL}_${aliasV}`;
                    const marcador = (p.r.toLowerCase() === 'vs') ? '-' : p.r;

                    filasPartidos += `
                        <div class="fila-partido-v2" onclick="abrirActaResultado('${idActa}')">
                            <img src="images/escudos_placeholder/${p.l}.png" class="escudo-v2" onerror="this.src='images/logo_placeholder.png'">
                            <span class="resultado-v2">${marcador}</span>
                            <img src="images/escudos_placeholder/${p.v}.png" class="escudo-v2" onerror="this.src='images/logo_placeholder.png'">
                        </div>
                    `;
                });

                contenidoHTML += `
                    <div class="card-jornada-v2">
                        <div class="header-jornada-v2"><span>JORNADA ${i}</span></div>
                        <div class="body-jornada-v2">${filasPartidos}</div>
                    </div>
                `;
            }
            track.innerHTML = contenidoHTML + contenidoHTML;
        }

        // Base de datos de partidos (Nombres anonimizados para Github)
        function obtenerDatosCrudosPartidos(n) {
            const db = {
                1: [{l:"EQUIPO ALPHA", v:"EQUIPO BRAVO", r:"3 - 6"}, {l:"EQUIPO CHARLIE", v:"EQUIPO DELTA", r:"1 - 6"}, {l:"EQUIPO ECHO", v:"EQUIPO FOXTROT", r:"13 - 0"}],
                2: [{l:"EQUIPO FOXTROT", v:"EQUIPO BRAVO", r:"3 - 5"}, {l:"EQUIPO DELTA", v:"EQUIPO ALPHA", r:"10 - 1"}, {l:"EQUIPO ECHO", v:"EQUIPO CHARLIE", r:"6 - 2"}],
                // Añade o genera el resto dinámicamente en tu versión real...
            };
            return db[n] || [];
        }

        window.addEventListener('load', inicializarSliderResultados);
    </script>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos</title>
    
    <link rel="stylesheet" href="styles/equipos.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Righteous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX'); // Placeholder del ID de seguimiento
    </script>
</head>

<body>
    
    <nav class="navbar">
        <div class="logoLiga">
            <a href="index.html">
                <img src="images/logo_principal_placeholder.png" alt="Logo principal liga" class="img">
            </a>
        </div>
        <div class="menu-toggle" id="menu-toggle" role="button" aria-label="Abrir menú" aria-expanded="false">&#9776;</div>
        
        <ul class="nav-links" id="nav-links" style="border-right: 40px solid;">
            <li><a href="calendario.html" style="color: #2c2c2c; font-family: Righteous;">CALENDARIO</a></li>
            <li><a href="estadisticas.html" style="color: #2c2c2c; font-family: Righteous;">ESTADÍSTICAS</a></li>
            <li><a href="documentos/bases_torneo_placeholder.pdf" target="_blank" style="color: #2c2c2c; font-family: Righteous;">BASES</a></li>
            <li><a href="actas.html" style="color: #2c2c2c; font-family: Righteous;">ÁRBITROS</a></li>
        </ul>
    </nav>

    <div class="equipos-header equipos-header-pequeno">
        <h2>EQUIPOS</h2>
    </div>

    <main>
        <section class="equipos-container">
            <div class="equipo-card">
                
                <a href="https://instagram.com/placeholder" target="_blank" class="equipo-instagram">
                    <img src="images/icon_instagram_placeholder.png" alt="Instagram del equipo">
                </a>
                
                <div class="equipo-header">
                    <div class="equipo-logo">
                        <img src="images/escudos_placeholder/equipo_alpha.png" alt="Escudo equipo">
                    </div>
                    <div class="equipo-nombre">EQUIPO ALPHA</div>
                </div>
                
                <div class="equipo-detalle">
                    <div class="equipo-separador-generico" style="height: 4px; background-color: #ef3340; margin: 10px 0;"></div>
                    
                    <div class="equipo-stats">
                        <div class="stat">
                            <span class="stat-title">POSICIÓN</span>
                            <span class="stat-value">1</span>
                        </div>
                        <div class="stat">
                            <span class="stat-title">PUNTOS</span>
                            <span class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-title">RESULTADO TEMP. ANTERIOR</span>
                            <span class="stat-value">N/A</span>
                        </div>
                    </div>
                    
                    <div class="equipo-jugadores">
                        <h3>JUGADORES</h3>
                        <div class="jugadores-grid">
                            
                            <div class="jugador-card">
                                <img src="images/jugadores_placeholder/avatar_1.png" alt="Foto jugador">
                                <span class="jugador-capitan">Jugador Uno</span>
                            </div>
                            
                            <div class="jugador-card">
                                <img src="images/jugadores_placeholder/avatar_2.png" alt="Foto jugador">
                                <span class="jugador-nombre">Jugador Dos</span>
                            </div>
                            
                            <div class="jugador-card">
                                <img src="images/jugadores_placeholder/avatar_3.png" alt="Foto jugador">
                                <span class="jugador-nombre">Jugador Tres</span>
                            </div>
                            
                            <div class="jugador-card">
                                <img src="images/jugadores_placeholder/avatar_4.png" alt="Foto jugador">
                                <span class="jugador-nombre">Jugador Cuatro</span>
                            </div>
                            
                            <div class="jugador-card">
                                <img src="images/jugadores_placeholder/avatar_5.png" alt="Foto jugador">
                                <span class="jugador-nombre">Jugador Cinco</span>
                            </div>
                            
                        </div>
                    </div>
                    
                    <div class="equipo-foto">
                        <img src="images/equipos_placeholder/foto_plantilla.jpg" alt="Foto del equipo completo">
                    </div>
                    
                </div>
            </div>
        </section>
        </main>

    <footer>
        <div class="footer-logo">
            <img src="images/logo_secundario_placeholder.png" alt="Logo Liga Secundario">
        </div>
        <hr class="footer-separator">
        <h2 class="footer-title">COLABORADORES</h2>
        <div class="footer-logos">
            <div class="logo-container logo-sponsor-1">
                <a href="https://ejemplo.com/sponsor1" target="_blank">
                    <img src="images/sponsor_1_placeholder.png" alt="Sponsor 1 Logo">
                </a>
            </div>
            <div class="logo-container logo-sponsor-2">
                <a href="https://ejemplo.com/sponsor2" target="_blank">
                    <img src="images/sponsor_2_placeholder.png" alt="Sponsor 2 Logo">
                </a>
            </div>
            <div class="logo-container logo-sponsor-3">
                <a href="https://ejemplo.com/sponsor3" target="_blank">
                    <img src="images/sponsor_3_placeholder.png" alt="Sponsor 3 Logo">
                </a>
            </div>
        </div>
    </footer>

    <script src="scripts/equipos.js"></script>
    
</body>
</html>
